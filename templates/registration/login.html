<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card border-0 shadow-sm" style="width:400px">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-graph-up-arrow fs-1 text-primary"></i>
                    <h4 class="fw-bold mt-2">Gestion Entreprise</h4>
                    <p class="text-muted small">Connectez-vous pour continuer</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger py-2">
                        <i class="bi bi-exclamation-circle"></i> Identifiants incorrects.
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom d'utilisateur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                placeholder="Votre nom d'utilisateur" autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                placeholder="Votre mot de passe">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Se connecter
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
