{% extends 'base.html' %}
{% block title %}Nouvelle Vente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-bold">
                <i class="bi bi-cart-plus"></i> Nouvelle Vente
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        <select name="{{ field.html_name }}" class="form-select">
                            {% for choice in field.field.choices %}
                            <option value="{{ choice.0 }}" {% if choice.0==field.value %}selected{% endif %}>{{ choice.1
                                }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> Créer la vente
                        </button>
                        <a href="{% url 'vente_list' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
